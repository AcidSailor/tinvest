version: "3"

tasks:
  proto:
    desc: Generate Go code from T-Invest proto contracts
    cmds:
      - |
        [ -d tmp/invest-contracts ] || git clone --depth 1 --branch 1.48 \
          https://opensource.tbank.ru/invest/invest-contracts.git \
          tmp/invest-contracts
      - buf generate tmp/invest-contracts/src/docs/contracts
    sources:
      - tmp/invest-contracts/src/docs/contracts/**/*.proto
      - buf.gen.yaml
    generates:
      - pb/**/*.go

  lint:
    desc: Run formatters + linters with autofix (mutates files)
    cmds:
      - golangci-lint fmt
      - golangci-lint run --fix

  ci:
    desc: Read-only fmt + lint verification for CI (fail-fast)
    cmds:
      - golangci-lint fmt --diff
      - golangci-lint run

  test:
    desc: Run tests
    cmds:
      - go test ./...

  check:
    desc: Local composite — lint (mutating) + tests
    cmds:
      - task: lint
      - task: test
